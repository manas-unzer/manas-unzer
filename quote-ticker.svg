<svg width="680" height="80" viewBox="0 0 680 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg   { fill: #141321; }
      .ttl  { font: bold 11px 'Segoe UI', Arial, sans-serif; fill: #fe428e; letter-spacing: 1.5px; }
      .qt   { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #a9fef7; }
      .au   { font: italic 12px 'Segoe UI', Arial, sans-serif; fill: #fe428e; }

      /* 6 quotes × 30 s = 180 s total cycle. Each quote owns 16.67% of the cycle.
         q0 starts visible immediately; q1–q5 fade in at their respective offset. */
      @keyframes q0 { 0%{opacity:1} 15.67%{opacity:1} 16.67%{opacity:0} 100%{opacity:0} }
      @keyframes q1 { 0%,16.67%{opacity:0} 17.67%{opacity:1} 32.33%{opacity:1} 33.33%{opacity:0} 100%{opacity:0} }
      @keyframes q2 { 0%,33.33%{opacity:0} 34.33%{opacity:1} 49%{opacity:1}    50%{opacity:0}    100%{opacity:0} }
      @keyframes q3 { 0%,50%{opacity:0}    51%{opacity:1}    65.67%{opacity:1} 66.67%{opacity:0} 100%{opacity:0} }
      @keyframes q4 { 0%,66.67%{opacity:0} 67.67%{opacity:1} 82.33%{opacity:1} 83.33%{opacity:0} 100%{opacity:0} }
      @keyframes q5 { 0%,83.33%{opacity:0} 84.33%{opacity:1} 99%{opacity:1}    100%{opacity:0} }

      .g0 { animation: q0 180s infinite; }
      .g1 { animation: q1 180s infinite; }
      .g2 { animation: q2 180s infinite; }
      .g3 { animation: q3 180s infinite; }
      .g4 { animation: q4 180s infinite; }
      .g5 { animation: q5 180s infinite; }
    </style>
  </defs>

  <rect width="680" height="80" rx="8" class="bg"/>
  <text x="340" y="17" text-anchor="middle" class="ttl">💬 Dev Quote of the Moment</text>

  <g class="g0">
    <text x="340" y="43" text-anchor="middle" class="qt">"The best code is no code at all."</text>
    <text x="340" y="63" text-anchor="middle" class="au">— Jeff Atwood</text>
  </g>
  <g class="g1">
    <text x="340" y="43" text-anchor="middle" class="qt">"Talk is cheap. Show me the code."</text>
    <text x="340" y="63" text-anchor="middle" class="au">— Linus Torvalds</text>
  </g>
  <g class="g2">
    <text x="340" y="43" text-anchor="middle" class="qt">"Make it work, make it right, make it fast."</text>
    <text x="340" y="63" text-anchor="middle" class="au">— Kent Beck</text>
  </g>
  <g class="g3">
    <text x="340" y="43" text-anchor="middle" class="qt">"Simplicity is the soul of efficiency."</text>
    <text x="340" y="63" text-anchor="middle" class="au">— Austin Freeman</text>
  </g>
  <g class="g4">
    <text x="340" y="43" text-anchor="middle" class="qt">"Programs must be written for people to read."</text>
    <text x="340" y="63" text-anchor="middle" class="au">— Harold Abelson</text>
  </g>
  <g class="g5">
    <text x="340" y="43" text-anchor="middle" class="qt">"Any fool can write code a computer understands."</text>
    <text x="340" y="63" text-anchor="middle" class="au">— Martin Fowler</text>
  </g>
</svg>
